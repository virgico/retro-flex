<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Retro-flex — Team Retrospective</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#FAF9F7;--surface:#F3F1F9;--border:#E2DFEE;
  --accent:#9B8FD4;--accent-dk:#6B5FB0;
  --text-primary:#2D2B3D;--text-secondary:#8A87A0;
  --drop:#F5C4B3;--drop-text:#7A3320;
  --add:#B8DCCA;--add-text:#1E5C42;
  --keep:#C8C4EC;--keep-text:#3C3489;
  --improve:#F9D9A8;--improve-text:#7A5020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;color:var(--text-primary);background:var(--bg);min-height:100vh}
#topbar{position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.tb-left{display:flex;align-items:center;gap:12px}
.logo{font-size:15px;font-weight:500;color:var(--text-primary);letter-spacing:-.02em}
.logo span{color:var(--accent)}
.room-tag{font-size:11px;color:var(--text-secondary);background:var(--surface);border:1px solid var(--border);padding:2px 10px;border-radius:20px}
.phase-badge{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px}
.avatars{display:flex;gap:4px}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;border:2px solid #fff;background:var(--keep);color:var(--keep-text)}
#main{padding:76px 24px 40px}
button{font-family:inherit;cursor:pointer;transition:all .2s ease}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:500}
.btn:hover{background:var(--accent-dk)}
.btn:disabled{opacity:.35;cursor:default}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-secondary);border-radius:8px;padding:8px 20px;font-size:13px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:#E24B4A;color:#fff;border:none;border-radius:8px;padding:8px 20px;font-size:13px;font-weight:500}
.btn-danger:hover{background:#c03a39}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:13px;line-height:1.5;color:var(--text-primary);box-shadow:0 1px 3px rgba(100,90,160,.08);transition:all .2s ease;margin-bottom:8px}
.card-hidden{background:var(--bg);border:1px dashed var(--border);color:var(--text-secondary);text-align:center;letter-spacing:.1em;user-select:none}
.lane-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.lane{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;min-height:420px}
.lane-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.lane-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}
.lane-cards{flex:1;overflow-y:auto}
.lane-input{margin-top:10px}
.lane-input textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(--text-primary);background:#fff;resize:none;min-height:72px;outline:none;transition:border-color .2s}
.lane-input textarea:focus{border-color:var(--accent)}
.lane-input textarea:disabled{background:var(--surface);color:var(--text-secondary);cursor:not-allowed}
.card-vote-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.vote-btn{font-size:11px;font-weight:500;padding:3px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);white-space:nowrap;flex-shrink:0;cursor:pointer}
.vote-btn:hover:not(:disabled){background:var(--keep);color:var(--keep-text);border-color:var(--keep-text)}
.vote-btn:disabled{opacity:.45;cursor:default}
.vote-count{font-size:11px;color:var(--text-secondary);margin-top:4px}
#lobby-screen{display:flex;align-items:center;justify-content:center;min-height:80vh}
.lobby-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:400px;text-align:center}
.lobby-card input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text-primary);background:var(--surface);outline:none;margin-bottom:12px;transition:border-color .2s}
.lobby-card input:focus{border-color:var(--accent);background:#fff}
.waiting-list{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:left}
.waiting-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);padding:4px 0}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--add-text);flex-shrink:0}
#landing-screen{display:flex;align-items:center;justify-content:center;min-height:80vh}
.landing-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:400px;text-align:center}
.landing-card input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-family:inherit;font-size:14px;color:var(--text-primary);background:var(--surface);outline:none;margin-bottom:12px;transition:border-color .2s;text-align:center}
.landing-card input:focus{border-color:var(--accent);background:#fff}
.disc-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.disc-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.disc-votes{font-size:12px;font-weight:500;color:var(--accent);min-width:32px;text-align:right;flex-shrink:0;margin-top:2px}
.fac-bar{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.fac-label{font-size:13px;color:var(--text-secondary)}
.fac-label strong{color:var(--text-primary);font-weight:500}
.error-banner{background:#FEF0EE;border:1px solid #F5C4B3;color:var(--drop-text);border-radius:10px;padding:10px 16px;font-size:13px;margin-bottom:16px}
.section-title{font-size:12px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}.mt-12{margin-top:12px}.mt-20{margin-top:20px}.w-full{width:100%}

/* Timer */
.timer-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-top:8px}
.timer-display{font-size:20px;font-weight:500;color:var(--text-primary);min-width:52px;font-variant-numeric:tabular-nums}
.timer-display.urgent{color:#E24B4A}
.timer-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.timer-bar{height:4px;background:var(--accent);border-radius:4px;transition:width .5s linear,background .5s}
.timer-bar.urgent{background:#E24B4A}

@media(max-width:640px){.lane-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.lane-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="topbar">
  <div class="tb-left">
    <span class="logo">retro<span>-flex</span></span>
    <span class="room-tag" id="tb-room"></span>
    <span class="phase-badge" id="tb-phase" style="display:none"></span>
  </div>
  <div class="flex items-center gap-12">
    <span id="tb-status" style="font-size:12px;color:var(--text-secondary)"></span>
    <div class="avatars" id="tb-avatars"></div>
  </div>
</div>

<div id="main">
  <div id="error-area"></div>

  <!-- Landing -->
  <div id="landing-screen" style="display:none">
    <div class="landing-card">
      <div style="font-size:22px;font-weight:500;margin-bottom:4px">retro-flex</div>
      <p style="color:var(--text-secondary);font-size:13px;margin-bottom:28px">A calm space for honest retrospectives</p>
      <input id="landing-room" placeholder="room name (e.g. sprint-14)" maxlength="40"/>
      <input id="landing-name" placeholder="your name" maxlength="30"/>
      <button class="btn w-full mt-12" id="landing-go">Create room →</button>
    </div>
  </div>

  <!-- Lobby -->
  <div id="lobby-screen" style="display:none">
    <div style="display:flex;align-items:center;justify-content:center;min-height:70vh">
      <div class="lobby-card">
        <div style="font-size:20px;font-weight:500;margin-bottom:4px">Welcome to retro-flex</div>
        <p style="color:var(--text-secondary);font-size:13px;margin-bottom:24px">Share this link with your team</p>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text-secondary);word-break:break-all;margin-bottom:20px" id="share-url"></div>
        <input id="lobby-name" placeholder="your name" maxlength="30"/>
        <button class="btn w-full" id="lobby-join-btn">Join session</button>
        <div class="waiting-list" id="lobby-user-list" style="display:none">
          <div class="section-title">In the room</div>
        </div>
        <div id="lobby-fac-area" style="margin-top:16px;display:none">
          <button class="btn w-full" id="lobby-start-btn">Start session →</button>
        </div>
        <p id="lobby-waiting-msg" style="margin-top:16px;font-size:13px;color:var(--text-secondary);display:none">Waiting for facilitator to start…</p>
      </div>
    </div>
  </div>

  <!-- Writing -->
  <div id="writing-screen" style="display:none">
    <div class="fac-bar" id="writing-fac-bar" style="display:none">
      <span class="fac-label"><span id="writing-submit-count">0 / 0</span> submitted</span>
      <button class="btn" id="reveal-btn" disabled>Reveal cards</button>
    </div>
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px" id="writing-status-nonFac"></div>
    <div class="lane-grid" id="lane-grid"></div>
    <div class="flex justify-end mt-20">
      <button class="btn" id="submit-cards-btn">Submit my cards</button>
    </div>
  </div>

  <!-- Reveal -->
  <div id="reveal-screen" style="display:none">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px">
      <div style="font-size:28px;font-weight:300;color:var(--accent)">revealing cards…</div>
      <div style="font-size:13px;color:var(--text-secondary)">hold on</div>
    </div>
  </div>

  <!-- Voting -->
  <div id="voting-screen" style="display:none">
    <div class="fac-bar">
      <span class="fac-label" id="voting-votes-label">3 votes remaining</span>
      <button class="btn" id="end-voting-btn" style="display:none">End voting →</button>
    </div>
    <div class="lane-grid" id="voting-lane-grid"></div>
  </div>

  <!-- Discussion -->
  <div id="discussion-screen" style="display:none">
    <div class="flex justify-between items-center" style="margin-bottom:20px">
      <div>
        <div style="font-size:18px;font-weight:500">Discussion</div>
        <div style="font-size:13px;color:var(--text-secondary)">Sorted by votes — start at the top</div>
      </div>
      <button class="btn" id="export-btn">Export PDF</button>
    </div>
    <div id="discussion-list"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, update, get, onValue, remove, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// 🔧 REPLACE these values with your Firebase project config
const firebaseConfig = {
  apiKey: "AIzaSyBTT5JXSZ8JwMELQPMTDlSBwJIzhTd3gJc",
  authDomain: "retro-flex.firebaseapp.com",
  databaseURL: "https://retro-flex-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "retro-flex",
  storageBucket: "retro-flex.firebasestorage.app",
  messagingSenderId: "997058225582",
  appId: "1:997058225582:web:ac3cd040d10352ace2d43f"
};

// ── State ──────────────────────────────────────────────────────────────────
let db, roomId, myUserId, myName, isFacilitator=false;
let currentPhase='lobby', allCards={}, allVotes={}, allUsers={};
let votesRemaining=3, mySubmitted=false;
// Timer state
let timerInterval=null, timerSeconds=0, timerRunning=false, timerCardId=null;
const TIMER_MAX=240; // 4 minutes
const LANES=['drop','add','keep','improve'];
const LANE_LABELS={drop:'Drop',add:'Add',keep:'Keep',improve:'Improve'};

// ── Init ───────────────────────────────────────────────────────────────────
try {
  const app=initializeApp(firebaseConfig);
  db=getDatabase(app);
} catch(e) {
  showError('Having trouble connecting — check your Firebase config');
}

const params=new URLSearchParams(location.search);
roomId=params.get('room');

if(!roomId) {
  show('landing');
  document.getElementById('landing-go').onclick=()=>{
    const r=document.getElementById('landing-room').value.trim().replace(/\s+/g,'-').toLowerCase();
    const n=document.getElementById('landing-name').value.trim();
    if(!r||!n){alert('Please enter a room name and your name.');return;}
    sessionStorage.setItem('beacon-name',n);
    location.href=location.pathname+'?room='+encodeURIComponent(r);
  };
} else {
  document.getElementById('tb-room').textContent=roomId;
  document.getElementById('share-url').textContent=location.href;
  show('lobby');
  const savedName=sessionStorage.getItem('beacon-name');
  if(savedName) document.getElementById('lobby-name').value=savedName;
  document.getElementById('lobby-join-btn').onclick=joinRoom;
  document.getElementById('lobby-name').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});
}

// ── Join ───────────────────────────────────────────────────────────────────
async function joinRoom(){
  const nameInput=document.getElementById('lobby-name');
  myName=nameInput.value.trim();
  if(!myName){alert('Please enter your name.');return;}
  myUserId=sessionStorage.getItem('beacon-uid')||crypto.randomUUID();
  sessionStorage.setItem('beacon-uid',myUserId);
  sessionStorage.setItem('beacon-name',myName);
  nameInput.disabled=true;
  document.getElementById('lobby-join-btn').disabled=true;

  const snap=await get(ref(db,`rooms/${roomId}`));
  if(!snap.exists()){
    await set(ref(db,`rooms/${roomId}/meta`),{facilitator:myUserId,phase:'lobby',createdAt:Date.now()});
    isFacilitator=true;
  } else {
    const meta=snap.val().meta||{};
    isFacilitator=(meta.facilitator===myUserId);
  }

  const userRef=ref(db,`rooms/${roomId}/users/${myUserId}`);
  await set(userRef,{name:myName,joinedAt:Date.now()});
  onDisconnect(userRef).remove();
  listenToRoom();
}

// ── Listeners ──────────────────────────────────────────────────────────────
function listenToRoom(){
  onValue(ref(db,`rooms/${roomId}/meta`),snap=>{
    if(!snap.exists())return;
    const meta=snap.val();
    isFacilitator=(meta.facilitator===myUserId);
    if(meta.phase!==currentPhase){
      currentPhase=meta.phase;
      renderPhase();
    }
  });
  onValue(ref(db,`rooms/${roomId}/users`),snap=>{
    allUsers=snap.val()||{};
    renderAvatars();
    renderLobbyUserList();
    updateWritingSubmitCount();
  });
  onValue(ref(db,`rooms/${roomId}/cards`),snap=>{
    allCards=snap.val()||{};
    if(currentPhase==='writing') renderWritingCards();
    if(currentPhase==='voting') renderVotingCards();
    if(currentPhase==='discussion') renderDiscussion();
    updateWritingSubmitCount();
    updateRevealButton();
  });
  onValue(ref(db,`rooms/${roomId}/votes`),snap=>{
    allVotes=snap.val()||{};
    if(currentPhase==='voting') renderVotingCards();
    if(currentPhase==='discussion') renderDiscussion();
  });
  renderPhase();
}

// ── Phase router ───────────────────────────────────────────────────────────
function renderPhase(){
  const badge=document.getElementById('tb-phase');
  badge.style.display='inline-block';
  const cfgs={
    lobby:      {label:'Lobby',      bg:'var(--surface)',  color:'var(--text-secondary)'},
    writing:    {label:'Writing',    bg:'var(--keep)',     color:'var(--keep-text)'},
    reveal:     {label:'Revealing',  bg:'var(--improve)',  color:'var(--improve-text)'},
    voting:     {label:'Voting',     bg:'var(--add)',      color:'var(--add-text)'},
    discussion: {label:'Discussion', bg:'var(--accent)',   color:'#fff'},
  };
  const cfg=cfgs[currentPhase]||cfgs.lobby;
  badge.textContent=cfg.label;
  badge.style.background=cfg.bg;
  badge.style.color=cfg.color;

  ['lobby','writing','reveal','voting','discussion'].forEach(p=>{
    const el=document.getElementById(p+'-screen');
    if(el) el.style.display=(p===currentPhase)?'block':'none';
  });

  if(currentPhase==='lobby')      setupLobbyPhase();
  if(currentPhase==='writing')    setupWritingPhase();
  if(currentPhase==='reveal')     setupRevealPhase();
  if(currentPhase==='voting')     setupVotingPhase();
  if(currentPhase==='discussion') renderDiscussion();
}

// ── Lobby ──────────────────────────────────────────────────────────────────
function setupLobbyPhase(){
  renderLobbyUserList();
  if(isFacilitator){
    document.getElementById('lobby-fac-area').style.display='block';
    document.getElementById('lobby-waiting-msg').style.display='none';
    document.getElementById('lobby-start-btn').onclick=()=>update(ref(db,`rooms/${roomId}/meta`),{phase:'writing'});
  } else {
    document.getElementById('lobby-fac-area').style.display='none';
    document.getElementById('lobby-waiting-msg').style.display='block';
  }
}

function renderLobbyUserList(){
  const list=document.getElementById('lobby-user-list');
  if(Object.keys(allUsers).length===0){list.style.display='none';return;}
  list.style.display='block';
  list.querySelectorAll('.waiting-item').forEach(i=>i.remove());
  Object.entries(allUsers).forEach(([uid,u])=>{
    const div=document.createElement('div');
    div.className='waiting-item';
    div.innerHTML=`<span class="online-dot"></span>${esc(u.name)}${uid===myUserId?' (you)':''}`;
    list.appendChild(div);
  });
}

// ── Writing ────────────────────────────────────────────────────────────────
function setupWritingPhase(){
  buildLaneGrid();
  renderWritingCards();
  updateRevealButton();
  updateWritingSubmitCount();

  const facBar=document.getElementById('writing-fac-bar');
  const nonFacStatus=document.getElementById('writing-status-nonFac');
  if(isFacilitator){
    facBar.style.display='flex';
    nonFacStatus.style.display='none';
  } else {
    facBar.style.display='none';
    nonFacStatus.style.display='block';
    nonFacStatus.textContent='Write your cards and submit when ready.';
  }

  document.getElementById('reveal-btn').onclick=()=>update(ref(db,`rooms/${roomId}/meta`),{phase:'reveal'});

  const submitBtn=document.getElementById('submit-cards-btn');
  if(mySubmitted){
    submitBtn.style.display='none';
  } else {
    submitBtn.style.display='inline-block';
    submitBtn.onclick=submitCards;
  }
}

function buildLaneGrid(){
  const grid=document.getElementById('lane-grid');
  if(grid.querySelector('.lane'))return;
  LANES.forEach(lane=>{
    const col=document.createElement('div');
    col.className='lane';
    col.innerHTML=`
      <div class="lane-header">
        <span class="lane-badge" style="background:var(--${lane});color:var(--${lane}-text)">${LANE_LABELS[lane]}</span>
      </div>
      <div class="lane-cards" id="cards-${lane}"></div>
      <div class="lane-input">
        <textarea id="ta-${lane}" placeholder="Add a card to ${LANE_LABELS[lane]}…" rows="3"></textarea>
      </div>`;
    grid.appendChild(col);
  });
}

function renderWritingCards(){
  LANES.forEach(lane=>{
    const container=document.getElementById('cards-'+lane);
    if(!container)return;
    container.innerHTML='';
    Object.entries(allCards).forEach(([,c])=>{
      if(c.lane!==lane)return;
      const div=document.createElement('div');
      if(c.authorId===myUserId){div.className='card';div.textContent=c.text;}
      else{div.className='card card-hidden';div.textContent='···';}
      container.appendChild(div);
    });
  });
}

async function submitCards(){
  const updates={};
  let hasAny=false;
  LANES.forEach(lane=>{
    const ta=document.getElementById('ta-'+lane);
    const txt=ta?ta.value.trim():'';
    if(txt){
      const cardId=`card_${Date.now()}_${lane}_${Math.random().toString(36).slice(2,6)}`;
      updates[`rooms/${roomId}/cards/${cardId}`]={authorId:myUserId,lane,text:txt,submittedAt:Date.now()};
      hasAny=true;
    }
  });
  if(!hasAny){alert('Write at least one card before submitting.');return;}
  await update(ref(db),updates);
  mySubmitted=true;
  LANES.forEach(lane=>{
    const ta=document.getElementById('ta-'+lane);
    if(ta){ta.disabled=true;ta.style.opacity='.5';}
  });
  document.getElementById('submit-cards-btn').style.display='none';
  updateRevealButton();
}

function updateWritingSubmitCount(){
  if(currentPhase!=='writing')return;
  const authorIds=new Set(Object.values(allCards).map(c=>c.authorId));
  const total=Object.keys(allUsers).length;
  const submitted=[...authorIds].filter(id=>allUsers[id]).length;
  const el=document.getElementById('writing-submit-count');
  if(el) el.textContent=`${submitted} / ${total}`;
  updateRevealButton();
}

function updateRevealButton(){
  if(currentPhase!=='writing'||!isFacilitator)return;
  const authorIds=new Set(Object.values(allCards).map(c=>c.authorId));
  const total=Object.keys(allUsers).length;
  const allIn=total>0&&Object.keys(allUsers).every(uid=>authorIds.has(uid));
  const btn=document.getElementById('reveal-btn');
  if(btn) btn.disabled=!allIn;
}

// ── Reveal ─────────────────────────────────────────────────────────────────
function setupRevealPhase(){
  setTimeout(()=>{
    if(isFacilitator) update(ref(db,`rooms/${roomId}/meta`),{phase:'voting'});
  },2000);
}

// ── Voting ─────────────────────────────────────────────────────────────────
function setupVotingPhase(){
  // Re-calculate votes already cast in a previous session/refresh
  const alreadyCast=Object.values(allVotes).filter(v=>v&&v[myUserId]).length;
  votesRemaining=Math.max(0, 3-alreadyCast);
  updateVotesLabel();
  const endBtn=document.getElementById('end-voting-btn');
  endBtn.style.display=isFacilitator?'inline-block':'none';
  endBtn.onclick=()=>update(ref(db,`rooms/${roomId}/meta`),{phase:'discussion'});
  renderVotingCards();
}

function updateVotesLabel(){
  const el=document.getElementById('voting-votes-label');
  if(el) el.textContent=`${votesRemaining} vote${votesRemaining!==1?'s':''} remaining`;
}

function renderVotingCards(){
  const grid=document.getElementById('voting-lane-grid');
  if(!grid)return;
  grid.innerHTML='';
  LANES.forEach(lane=>{
    const laneCards=Object.entries(allCards).filter(([,c])=>c.lane===lane);
    const col=document.createElement('div');
    col.className='lane';
    col.innerHTML=`<div class="lane-header"><span class="lane-badge" style="background:var(--${lane});color:var(--${lane}-text)">${LANE_LABELS[lane]}</span></div>`;
    const area=document.createElement('div');
    laneCards.forEach(([cid,c])=>{
      const votes=allVotes[cid]||{};
      const count=Object.keys(votes).length;
      const alreadyVoted=!!votes[myUserId];
      // Disable if already voted on this card OR no votes left
      const disabled=alreadyVoted||votesRemaining<=0;
      const card=document.createElement('div');
      card.className='card';
      card.innerHTML=`<div class="card-vote-row">
        <div style="flex:1"><div>${esc(c.text)}</div><div class="vote-count">${count} vote${count!==1?'s':''}</div></div>
        <button class="vote-btn" data-cid="${cid}" ${disabled?'disabled':''}>${alreadyVoted?'voted':'+ vote'}</button>
      </div>`;
      const btn=card.querySelector('.vote-btn');
      if(!disabled){
        btn.addEventListener('click',()=>castVote(cid));
      }
      area.appendChild(card);
    });
    col.appendChild(area);
    grid.appendChild(col);
  });
}

async function castVote(cardId){
  if(votesRemaining<=0)return;
  const votes=allVotes[cardId]||{};
  if(votes[myUserId])return;
  await set(ref(db,`rooms/${roomId}/votes/${cardId}/${myUserId}`),true);
  votesRemaining--;
  updateVotesLabel();
  // Re-render to reflect updated state
  renderVotingCards();
}

// ── Discussion ─────────────────────────────────────────────────────────────
function getSortedCards(){
  return Object.entries(allCards).map(([cid,c])=>{
    const voteCount=Object.keys(allVotes[cid]||{}).length;
    return{cid,c,voteCount};
  }).sort((a,b)=>b.voteCount-a.voteCount);
}

function renderDiscussion(){
  const list=document.getElementById('discussion-list');
  if(!list)return;
  // Stop any running timer when re-rendering
  const sorted=getSortedCards();
  list.innerHTML='';

  sorted.forEach(({cid,c,voteCount},idx)=>{
    const isTop=voteCount>0; // show timer for cards with at least 1 vote
    const wrapper=document.createElement('div');
    wrapper.className='disc-card';
    wrapper.id=`disc-${cid}`;

    // Card top row
    const topRow=document.createElement('div');
    topRow.style.cssText='display:flex;align-items:flex-start;gap:14px;margin-bottom:'+(isTop?'10px':'0');
    topRow.innerHTML=`
      <span class="disc-badge" style="background:var(--${c.lane});color:var(--${c.lane}-text)">${LANE_LABELS[c.lane]}</span>
      <div style="flex:1;font-size:14px">${esc(c.text)}</div>
      <span class="disc-votes">${voteCount} ▲</span>`;
    wrapper.appendChild(topRow);

    // Timer block (only for cards with votes, only facilitator can control)
    if(isTop){
      const timerWrap=document.createElement('div');
      timerWrap.className='timer-block';
      timerWrap.id=`timer-wrap-${cid}`;
      timerWrap.innerHTML=`
        <div class="timer-display" id="timer-disp-${cid}">4:00</div>
        <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar-${cid}" style="width:100%"></div></div>
        ${isFacilitator?`
          <button class="btn" id="timer-start-${cid}" style="padding:6px 14px;font-size:12px">Start</button>
          <button class="btn-danger" id="timer-stop-${cid}" style="padding:6px 14px;font-size:12px;display:none">Stop</button>
        `:`<span style="font-size:12px;color:var(--text-secondary)">facilitator controls timer</span>`}`;
      wrapper.appendChild(timerWrap);

      if(isFacilitator){
        document.addEventListener('DOMContentLoaded',()=>{},false);
        // Wire up after DOM is appended
        setTimeout(()=>{
          const startBtn=document.getElementById(`timer-start-${cid}`);
          const stopBtn=document.getElementById(`timer-stop-${cid}`);
          if(startBtn) startBtn.onclick=()=>startTimer(cid);
          if(stopBtn)  stopBtn.onclick=()=>stopTimer(cid);
        },0);
      }
    }
    list.appendChild(wrapper);
  });

  // Wire timer buttons (after list is in DOM)
  if(isFacilitator){
    sorted.filter(({voteCount})=>voteCount>0).forEach(({cid})=>{
      const startBtn=document.getElementById(`timer-start-${cid}`);
      const stopBtn=document.getElementById(`timer-stop-${cid}`);
      if(startBtn) startBtn.onclick=()=>startTimer(cid);
      if(stopBtn)  stopBtn.onclick=()=>stopTimer(cid);
    });
  }

  document.getElementById('export-btn').onclick=exportPDF;
}

// ── Timer ──────────────────────────────────────────────────────────────────
function startTimer(cid){
  // Stop any existing timer first
  if(timerInterval) stopTimer(timerCardId, true);

  timerCardId=cid;
  timerSeconds=0;
  timerRunning=true;

  const startBtn=document.getElementById(`timer-start-${cid}`);
  const stopBtn=document.getElementById(`timer-stop-${cid}`);
  if(startBtn) startBtn.style.display='none';
  if(stopBtn)  stopBtn.style.display='inline-block';

  timerInterval=setInterval(()=>{
    timerSeconds++;
    const remaining=TIMER_MAX-timerSeconds;
    updateTimerDisplay(cid, remaining);
    if(remaining<=0){
      clearInterval(timerInterval);
      timerRunning=false;
      ringBell();
      if(startBtn) startBtn.style.display='inline-block';
      if(stopBtn)  stopBtn.style.display='none';
      // Reset display
      setTimeout(()=>updateTimerDisplay(cid, TIMER_MAX),3000);
    }
  },1000);
}

function stopTimer(cid, silent=false){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  timerRunning=false;
  const startBtn=document.getElementById(`timer-start-${cid||timerCardId}`);
  const stopBtn=document.getElementById(`timer-stop-${cid||timerCardId}`);
  if(startBtn) startBtn.style.display='inline-block';
  if(stopBtn)  stopBtn.style.display='none';
  updateTimerDisplay(cid||timerCardId, TIMER_MAX);
}

function updateTimerDisplay(cid, remaining){
  const disp=document.getElementById(`timer-disp-${cid}`);
  const bar=document.getElementById(`timer-bar-${cid}`);
  if(!disp||!bar)return;
  const m=Math.floor(remaining/60);
  const s=remaining%60;
  disp.textContent=`${m}:${String(s).padStart(2,'0')}`;
  const pct=(remaining/TIMER_MAX)*100;
  bar.style.width=pct+'%';
  const urgent=remaining<=30;
  disp.classList.toggle('urgent',urgent);
  bar.classList.toggle('urgent',urgent);
}

function ringBell(){
  // Play a gentle bell using Web Audio API
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(delay=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=880;
      gain.gain.setValueAtTime(0.4,ctx.currentTime+delay);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.8);
      osc.start(ctx.currentTime+delay);
      osc.stop(ctx.currentTime+delay+0.9);
    });
  }catch(e){}
}

// ── PDF Export ─────────────────────────────────────────────────────────────
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const sorted=getSortedCards();
  const pageW=210, margin=20, contentW=pageW-margin*2;
  let y=margin;

  // Header
  doc.setFillColor(243,241,249);
  doc.rect(0,0,pageW,28,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.setTextColor(45,43,61);
  doc.text('retro-flex',margin,17);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9);
  doc.setTextColor(138,135,160);
  doc.text(`Room: ${roomId}`,margin+52,17);
  doc.text(new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}),pageW-margin,17,{align:'right'});
  y=38;

  // Section per lane
  LANES.forEach(lane=>{
    const laneCards=sorted.filter(({c})=>c.lane===lane);
    if(laneCards.length===0)return;

    // Check page space
    if(y>260){doc.addPage();y=margin;}

    // Lane header pill
    const laneColors={
      drop:{bg:[245,196,179],text:[122,51,32]},
      add:{bg:[184,220,202],text:[30,92,66]},
      keep:{bg:[200,196,236],text:[60,52,137]},
      improve:{bg:[249,217,168],text:[122,80,32]},
    };
    const lc=laneColors[lane];
    doc.setFillColor(...lc.bg);
    doc.roundedRect(margin,y,40,7,2,2,'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(8);
    doc.setTextColor(...lc.text);
    doc.text(LANE_LABELS[lane].toUpperCase(),margin+20,y+4.8,{align:'center'});
    y+=12;

    laneCards.forEach(({c,voteCount})=>{
      if(y>270){doc.addPage();y=margin;}
      // Card background
      doc.setFillColor(255,255,255);
      doc.setDrawColor(226,223,238);
      doc.setLineWidth(0.3);
      const lines=doc.splitTextToSize(c.text,contentW-24);
      const cardH=Math.max(14,lines.length*5.5+8);
      doc.roundedRect(margin,y,contentW,cardH,3,3,'FD');
      // Card text
      doc.setFont('helvetica','normal');
      doc.setFontSize(10);
      doc.setTextColor(45,43,61);
      doc.text(lines,margin+6,y+6.5);
      // Vote badge
      if(voteCount>0){
        doc.setFillColor(155,143,212);
        doc.roundedRect(margin+contentW-16,y+2,14,6,2,2,'F');
        doc.setFont('helvetica','bold');
        doc.setFontSize(7);
        doc.setTextColor(255,255,255);
        doc.text(`${voteCount}▲`,margin+contentW-9,y+6.2,{align:'center'});
      }
      y+=cardH+4;
    });
    y+=6;
  });

  // Footer on each page
  const pageCount=doc.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal');
    doc.setFontSize(8);
    doc.setTextColor(180,178,169);
    doc.text(`retro-flex · ${roomId} · page ${i} of ${pageCount}`,pageW/2,292,{align:'center'});
  }

  doc.save(`retro-flex-${roomId}.pdf`);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function show(screenId){
  ['landing','lobby','writing','reveal','voting','discussion'].forEach(id=>{
    const el=document.getElementById(id+'-screen');
    if(el) el.style.display=(id===screenId)?'block':'none';
  });
}

function renderAvatars(){
  const container=document.getElementById('tb-avatars');
  container.innerHTML='';
  const colors=[
    {bg:'var(--keep)',c:'var(--keep-text)'},{bg:'var(--add)',c:'var(--add-text)'},
    {bg:'var(--improve)',c:'var(--improve-text)'},{bg:'var(--drop)',c:'var(--drop-text)'},
  ];
  Object.entries(allUsers).forEach(([,u],i)=>{
    const av=document.createElement('div');
    av.className='av';
    const col=colors[i%colors.length];
    av.style.background=col.bg;av.style.color=col.c;
    av.title=u.name;av.textContent=u.name.charAt(0).toUpperCase();
    container.appendChild(av);
  });
}

function showError(msg){
  document.getElementById('error-area').innerHTML=`<div class="error-banner">${msg}</div>`;
}

function esc(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
